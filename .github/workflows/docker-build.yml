name: Docker Build & Push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Backend)
        id: meta-backend
        run: |
          echo "tags=${{ env.REGISTRY }}/${{ github.repository_owner }}/notas-backend:latest,${{ env.REGISTRY }}/${{ github.repository_owner }}/notas-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ github.repository_owner }}/notas-backend" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./app/Backend
          file: ./dockerfile/Notas-backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare Frontend build context
        run: |
          mkdir -p .build/frontend
          cp app/Frontend/index.html .build/frontend/
          cp dockerfile/Notas-frotnend/nginx.conf .build/frontend/

      - name: Extract metadata (Frontend)
        id: meta-frontend
        run: |
          echo "tags=${{ env.REGISTRY }}/${{ github.repository_owner }}/notas-frontend:latest,${{ env.REGISTRY }}/${{ github.repository_owner }}/notas-frontend:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "image=${{ env.REGISTRY }}/${{ github.repository_owner }}/notas-frontend" >> $GITHUB_OUTPUT

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./.build/frontend
          file: ./dockerfile/Notas-frotnend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
