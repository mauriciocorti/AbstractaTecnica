apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-config
  namespace: abstracta-tecnica
  labels:
    app.kubernetes.io/name: web-app
    app.kubernetes.io/component: config
data:
  nginx.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      # Endpoint dedicado para health checks (no contamina logs de app)
      location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
      }

      location /ready {
        access_log off;
        return 200 'ready';
        add_header Content-Type text/plain;
      }
    }
