apiVersion: v1
kind: ConfigMap
metadata:
  name: abstracta-demo-configmap
  namespace: abstracta-tecnica
  labels:
    app.kubernetes.io/name: abstracta-demo
    environment: production
    app.kubernetes.io/component: config
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Abstracta – Technical Challenge</title>
      <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --purple: #7B2FBE;
          --purple-light: #9B51E0;
          --purple-dark: #4A1080;
          --bg: #0D0D0F;
          --bg2: #13131A;
          --text: #F0EDF5;
          --muted: #7A7490;
          --mono: 'DM Mono', monospace;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: 'Syne', sans-serif;
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          overflow-x: hidden;
        }

        /* Grid background */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(rgba(123,47,190,0.07) 1px, transparent 1px),
            linear-gradient(90deg, rgba(123,47,190,0.07) 1px, transparent 1px);
          background-size: 48px 48px;
          pointer-events: none;
          z-index: 0;
        }

        /* Glow blob */
        body::after {
          content: '';
          position: fixed;
          top: -200px;
          left: 50%;
          transform: translateX(-50%);
          width: 800px;
          height: 600px;
          background: radial-gradient(ellipse at center, rgba(123,47,190,0.18) 0%, transparent 70%);
          pointer-events: none;
          z-index: 0;
        }

        main {
          position: relative;
          z-index: 1;
          flex: 1;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: 60px 24px;
          gap: 48px;
        }

        .badge {
          font-family: var(--mono);
          font-size: 11px;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: var(--purple-light);
          border: 1px solid rgba(123,47,190,0.4);
          padding: 6px 16px;
          border-radius: 100px;
          background: rgba(123,47,190,0.08);
          animation: fadeDown 0.6s ease both;
        }

        .hero {
          text-align: center;
          animation: fadeUp 0.7s ease 0.1s both;
        }

        .logo-mark {
          font-size: 72px;
          font-weight: 800;
          line-height: 1;
          background: linear-gradient(135deg, #fff 30%, var(--purple-light) 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
          letter-spacing: -2px;
        }

        .logo-mark span {
          color: var(--purple-light);
          -webkit-text-fill-color: var(--purple-light);
        }

        .subtitle {
          margin-top: 16px;
          font-family: var(--mono);
          font-size: 13px;
          color: var(--muted);
          letter-spacing: 0.06em;
        }

        .cards {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 16px;
          width: 100%;
          max-width: 760px;
          animation: fadeUp 0.7s ease 0.25s both;
        }

        .card {
          background: var(--bg2);
          border: 1px solid rgba(123,47,190,0.2);
          border-radius: 12px;
          padding: 24px 20px;
          transition: border-color 0.2s, transform 0.2s;
        }

        .card:hover {
          border-color: rgba(123,47,190,0.6);
          transform: translateY(-3px);
        }

        .card-icon {
          font-size: 22px;
          margin-bottom: 10px;
        }

        .card-title {
          font-size: 13px;
          font-weight: 700;
          color: var(--text);
          margin-bottom: 4px;
          letter-spacing: 0.04em;
        }

        .card-value {
          font-family: var(--mono);
          font-size: 12px;
          color: var(--purple-light);
        }

        .status-bar {
          display: flex;
          align-items: center;
          gap: 12px;
          font-family: var(--mono);
          font-size: 12px;
          color: var(--muted);
          animation: fadeUp 0.7s ease 0.4s both;
        }

        .dot {
          width: 8px;
          height: 8px;
          background: #3DDC84;
          border-radius: 50%;
          box-shadow: 0 0 8px #3DDC84;
          animation: pulse 2s infinite;
        }

        footer {
          position: relative;
          z-index: 1;
          text-align: center;
          padding: 24px;
          font-family: var(--mono);
          font-size: 11px;
          color: var(--muted);
          border-top: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeDown {
          from { opacity: 0; transform: translateY(-10px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50%       { opacity: 0.4; }
        }
      </style>
    </head>
    <body>
      <main>
        <div class="badge">Hola Staff de Abstracta</div>

        <div class="hero">
          <div class="logo-mark">abstracta<span>.</span></div>
          <p class="subtitle">Kubernetes Demo · OKE · nginx:1.25-alpine</p>
        </div>

        <div class="cards">
          <div class="card">
            <div class="card-icon">☸️</div>
            <div class="card-title">Plataforma</div>
            <div class="card-value">Oracle Kubernetes Engine</div>
          </div>
          <div class="card">
            <div class="card-icon">🔁</div>
            <div class="card-title">Réplicas</div>
            <div class="card-value">2 pods · HPA max 5</div>
          </div>
          <div class="card">
            <div class="card-icon">🌐</div>
            <div class="card-title">Acceso</div>
            <div class="card-value">Ingress · OCI Load Balancer</div>
          </div>
          <div class="card">
            <div class="card-icon">💓</div>
            <div class="card-title">Health checks</div>
            <div class="card-value">/healthz · /ready</div>
          </div>
        </div>

        <div class="status-bar">
          <div class="dot"></div>
          <span>Cluster activo · namespace: abstracta-tecnica</span>
        </div>
      </main>

      <footer>abstracta © 2026 · Mauricio Corti · reto técnico devops</footer>
    </body>
    </html>

  nginx.conf: |
    server {
      listen 80;
      server_name _;

      location / {
        root /usr/share/nginx/html;
        index index.html;
      }

      # Endpoint dedicado para health checks (no contamina logs de app)
      location /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
      }

      location /ready {
        access_log off;
        return 200 'ready';
        add_header Content-Type text/plain;
      }
    }