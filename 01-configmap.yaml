apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
  namespace: abstracta
  labels:
    app: nginx-app
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Mi App en Kubernetes</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'Segoe UI', sans-serif;
          background: #0f172a;
          color: #e2e8f0;
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
        }
        .card {
          background: #1e293b;
          border: 1px solid #334155;
          border-radius: 16px;
          padding: 48px 56px;
          text-align: center;
          max-width: 480px;
          box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .badge {
          display: inline-block;
          background: #22c55e22;
          color: #22c55e;
          border: 1px solid #22c55e44;
          border-radius: 999px;
          padding: 4px 14px;
          font-size: 0.75rem;
          font-weight: 600;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          margin-bottom: 24px;
        }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
        p  { color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
        .meta {
          background: #0f172a;
          border-radius: 8px;
          padding: 16px;
          font-size: 0.85rem;
          color: #64748b;
          text-align: left;
        }
        .meta span { color: #38bdf8; font-weight: 600; }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="badge">● Running</div>
        <h1>Hola Abstracta me quiero unir al equipo de trabajo</h1>
        <p>Esta app está corriendo en un cluster de Kubernetes con nginx, 2 réplicas y health checks configurados.</p>
        <div class="meta">
          <div>Imagen: <span>nginx:alpine</span></div>
          <div>Réplicas: <span>2</span></div>
          <div>Acceso: <span>LoadBalancer</span></div>
        </div>
      </div>
    </body>
    </html>
