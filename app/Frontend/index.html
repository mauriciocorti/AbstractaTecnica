<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes · Docker + K8s Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
      --danger: #ff4747;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
    }

    header h1 span { color: var(--accent); }

    .stack-badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
    }
    .badge.accent { border-color: var(--accent); color: var(--accent); }

    .compose {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.875rem;
      padding: 0.75rem 1rem;
      border-radius: 3px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    button.add-btn {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.75rem 1.5rem;
      border-radius: 3px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button.add-btn:hover { opacity: 0.85; }
    button.add-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .note-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .note-content {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }

    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .note-time {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .delete-btn {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 0.65rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 2px;
      transition: all 0.15s;
    }
    .delete-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-bar {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 2px;
    }

    .status-bar .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 6px;
      vertical-align: middle;
    }
    .status-bar.ok .dot { background: var(--accent); }
    .status-bar.err .dot { background: var(--danger); }
  </style>
</head>
<body>

<header>
  <h1>notes<span>.</span></h1>
  <div class="stack-badges">
    <span class="badge accent">Docker</span>
    <span class="badge accent">Kubernetes</span>
    <span class="badge">Node.js</span>
    <span class="badge">PostgreSQL</span>
    <span class="badge">nginx</span>
  </div>
</header>

<div class="compose">
  <input type="text" id="noteInput" placeholder="write something..." maxlength="280" />
  <button class="add-btn" id="addBtn" onclick="addNote()">+ Add</button>
</div>

<div class="notes-grid" id="notesList">
  <div class="empty-state">loading...</div>
</div>

<div class="status-bar" id="statusBar">
  <span class="dot"></span><span id="statusText">connecting</span>
</div>

<script>
  const API = window.API_URL || "http://localhost:3000";

  function setStatus(ok, text) {
    const bar = document.getElementById("statusBar");
    bar.className = "status-bar " + (ok ? "ok" : "err");
    document.getElementById("statusText").textContent = text;
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString("es-UY", { day: "2-digit", month: "short" }) +
      " · " + d.toLocaleTimeString("es-UY", { hour: "2-digit", minute: "2-digit" });
  }

  async function loadNotes() {
    try {
      const res = await fetch(`${API}/notes`);
      const notes = await res.json();
      render(notes);
      setStatus(true, `backend ok · ${notes.length} notes`);
    } catch (e) {
      setStatus(false, "backend unreachable");
      document.getElementById("notesList").innerHTML =
        '<div class="empty-state">⚠ can\'t reach backend</div>';
    }
  }

  function render(notes) {
    const list = document.getElementById("notesList");
    if (notes.length === 0) {
      list.innerHTML = '<div class="empty-state">no notes yet — write one above</div>';
      return;
    }
    list.innerHTML = notes.map(n => `
      <div class="note-card" id="note-${n.id}">
        <div class="note-content">${escapeHtml(n.content)}</div>
        <div class="note-meta">
          <span class="note-time">${formatTime(n.created_at)}</span>
          <button class="delete-btn" onclick="deleteNote(${n.id})">delete</button>
        </div>
      </div>
    `).join("");
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function addNote() {
    const input = document.getElementById("noteInput");
    const btn = document.getElementById("addBtn");
    const content = input.value.trim();
    if (!content) return;

    btn.disabled = true;
    try {
      await fetch(`${API}/notes`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ content }),
      });
      input.value = "";
      await loadNotes();
    } catch (e) {
      setStatus(false, "error saving note");
    } finally {
      btn.disabled = false;
    }
  }

  async function deleteNote(id) {
    try {
      await fetch(`${API}/notes/${id}`, { method: "DELETE" });
      document.getElementById(`note-${id}`)?.remove();
      await loadNotes();
    } catch (e) { setStatus(false, "error deleting"); }
  }

  document.getElementById("noteInput").addEventListener("keydown", e => {
    if (e.key === "Enter") addNote();
  });

  loadNotes();
</script>
</body>
</html>
