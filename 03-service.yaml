apiVersion: v1
kind: Service
metadata:
  name: nginx-app-svc
  namespace: abstracta
  labels:
    app: nginx-app
spec:
  type: LoadBalancer
  selector:
    app: nginx-app   # apunta a los pods del Deployment
  ports:
    - name: http
      protocol: TCP
      port: 80        # puerto expuesto externamente
      targetPort: 80  # puerto del contenedor
