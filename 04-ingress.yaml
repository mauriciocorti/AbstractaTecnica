apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: abstracta-demo-ingress
  namespace: abstracta-tecnica
  labels:
    app.kubernetes.io/name: abstracta-demo
    environment: production
    app.kubernetes.io/component: frontend
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: abstracta-demo-service
                port:
                  name: http