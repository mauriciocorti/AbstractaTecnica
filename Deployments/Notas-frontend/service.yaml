# ─────────────────────────────────────────────
# Service – LoadBalancer (expone al exterior)
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer      # NodePort si usas Minikube
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80