apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: abstracta
  labels:
    app: nginx-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
        - name: nginx
          image: nginx-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80

          # -------------------------------------------------
          # Variables de entorno leídas desde el ConfigMap
          # -------------------------------------------------
          envFrom:
            - configMapRef:
                name: nginx-config

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
